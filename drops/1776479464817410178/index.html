<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Void - Syrup Latency</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #0a0a0f;
    font-family: 'Courier New', monospace;
    cursor: none;
    user-select: none;
}

/* The Void zone - a dark pooled area */
#void-zone {
    position: absolute;
    top: 50%; left: 50%;
    width: 420px; height: 420px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: radial-gradient(circle, #1a0a2e 0%, #0d0618 60%, transparent 100%);
    box-shadow: 0 0 80px 30px rgba(90, 40, 140, 0.15);
    transition: box-shadow 0.4s ease;
    pointer-events: none;
    z-index: 1;
}

#void-zone.active {
    box-shadow: 0 0 120px 60px rgba(90, 40, 140, 0.35);
}

/* Boundary ring - subtle warning */
#boundary-ring {
    position: absolute;
    top: 50%; left: 50%;
    width: 420px; height: 420px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    border: 1.5px solid rgba(90, 40, 140, 0.2);
    pointer-events: none;
    z-index: 2;
    opacity: 0;
    transition: opacity 0.3s ease;
}

#boundary-ring.visible { opacity: 1; }

/* The dragged token */
#token {
    position: absolute;
    width: 48px; height: 48px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #c8a0ff, #7b3fa0);
    box-shadow: 0 0 20px rgba(160, 100, 255, 0.4), inset 0 -2px 6px rgba(0,0,0,0.3);
    z-index: 10;
    pointer-events: none;
    transform: translate(-50%, -50%);
    will-change: left, top;
}

/* Delayed cursor (follows token with syrup lag) */
#cursor {
    position: absolute;
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 2px solid rgba(200, 160, 255, 0.8);
    background: radial-gradient(circle, rgba(200, 160, 255, 0.3), transparent);
    box-shadow: 0 0 12px rgba(160, 100, 255, 0.3);
    z-index: 10;
    pointer-events: none;
    transform: translate(-50%, -50%);
    will-change: left, top, opacity;
    transition: opacity 0.2s;
}

/* Latency meter */
#hud {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%);
    color: rgba(160, 130, 220, 0.6);
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    z-index: 20;
    display: flex;
    align-items: center;
    gap: 12px;
    pointer-events: none;
}

#hud-bar {
    width: 160px; height: 3px;
    background: rgba(90, 40, 140, 0.2);
    border-radius: 2px;
    overflow: hidden;
}

#hud-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #7b3fa0, #c8a0ff);
    border-radius: 2px;
    transition: width 0.05s linear;
}

/* Escape pressure overlay */
#pressure {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at var(--mx, 50%) var(--my, 50%), transparent 30%, rgba(10, 5, 20, 0.6) 100%);
    pointer-events: none;
    z-index: 3;
    opacity: 0;
    transition: opacity 0.3s ease;
}

#pressure.active { opacity: 1; }

/* Vignette pulse on heavy lag */
#vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 4;
    opacity: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(5, 0, 15, 0.8));
    animation: vignette-pulse 2s ease-in-out infinite;
}

@keyframes vignette-pulse {
    0%, 100% { opacity: 0; }
    50% { opacity: 0.4; }
}

#vignette.heavy { animation-duration: 0.6s; }

/* Info overlay */
#info {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: rgba(200, 160, 255, 0.35);
    font-size: 14px;
    letter-spacing: 3px;
    text-transform: uppercase;
    z-index: 20;
    pointer-events: none;
    text-align: center;
    line-height: 2;
}

#info.hidden { opacity: 0; transition: opacity 0.5s; }
</style>
</head>
<body>

<div id="void-zone"></div>
<div id="boundary-ring"></div>
<div id="token"></div>
<div id="cursor"></div>
<div id="pressure"></div>
<div id="vignette"></div>
<div id="hud">
    <span>LATENCY</span>
    <div id="hud-bar"><div id="hud-fill"></div></div>
    <span id="hud-value">0ms</span>
</div>
<div id="info">move into the void</div>

<script>
(function() {
    // Config
    var VOID_CENTER = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
    var VOID_RADIUS = 210;
    var SYRUP_LAG = 150;
    var LERP_SPEED = 0.18;

    // State
    var mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;
    var tokenX = VOID_CENTER.x, tokenY = VOID_CENTER.y;
    var cursorX = VOID_CENTER.x, cursorY = VOID_CENTER.y;
    var inVoid = false;
    var dragActive = false;
    var hasEnteredOnce = false;
    var lagBuffer = [];

    // DOM refs
    var $token      = document.getElementById('token');
    var $cursor     = document.getElementById('cursor');
    var $voidZone   = document.getElementById('void-zone');
    var $ring       = document.getElementById('boundary-ring');
    var $pressure   = document.getElementById('pressure');
    var $vignette   = document.getElementById('vignette');
    var $hudFill    = document.getElementById('hud-fill');
    var $hudValue   = document.getElementById('hud-value');
    var $info       = document.getElementById('info');

    // Helpers
    function dist(x1, y1, x2, y2) {
        return Math.sqrt((x2 - x1) * (x2 - x1) + (y2 - y1) * (y2 - y1));
    }

    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

    // Input
    document.addEventListener('mousemove', function(e) {
        mouseX = e.clientX;
        mouseY = e.clientY;
    });

    document.addEventListener('mousedown', function(e) {
        dragActive = true;
        $info.classList.add('hidden');
    });

    document.addEventListener('mouseup', function() {
        dragActive = false;
    });

    // Touch support
    document.addEventListener('touchstart', function(e) {
        e.preventDefault();
        dragActive = true;
        mouseX = e.touches[0].clientX;
        mouseY = e.touches[0].clientY;
        $info.classList.add('hidden');
    }, { passive: false });

    document.addEventListener('touchmove', function(e) {
        e.preventDefault();
        mouseX = e.touches[0].clientX;
        mouseY = e.touches[0].clientY;
    }, { passive: false });

    document.addEventListener('touchend', function() {
        dragActive = false;
    });

    // Main loop
    var lastTime = performance.now();
    var frameCount = 0;

    function loop(now) {
        requestAnimationFrame(loop);

        var dt = Math.min((now - lastTime) / 16.67, 3);
        lastTime = now;
        frameCount++;

        var mouseDistFromCenter = dist(mouseX, mouseY, VOID_CENTER.x, VOID_CENTER.y);
        var wasInVoid = inVoid;
        inVoid = mouseDistFromCenter < VOID_RADIUS;

        // Void entry tracking
        if (inVoid && !wasInVoid) {
            hasEnteredOnce = true;
            lagBuffer = [];
        }

        // Token position: follows real mouse, but clamped/resisted inside void
        if (inVoid) {
            var dx = VOID_CENTER.x - mouseX;
            var dy = VOID_CENTER.y - mouseY;
            var pullStrength = clamp(0.02 * (1 + frameCount * 0.003), 0.02, 0.08);

            tokenX += dx * pullStrength * dt;
            tokenY += dy * pullStrength * dt;

            // Hard clamp: keep token inside void
            var tokenDist = dist(tokenX, tokenY, VOID_CENTER.x, VOID_CENTER.y);
            if (tokenDist > VOID_RADIUS - 24) {
                var angle = Math.atan2(tokenY - VOID_CENTER.y, tokenX - VOID_CENTER.x);
                tokenX = VOID_CENTER.x + Math.cos(angle) * (VOID_RADIUS - 24);
                tokenY = VOID_CENTER.y + Math.sin(angle) * (VOID_RADIUS - 24);
            }
        } else {
            // Outside void: token follows mouse directly
            tokenX = mouseX;
            tokenY = mouseY;
        }

        // Cursor: delayed follow of token with syrup lag
        var localDx = tokenX - VOID_CENTER.x;
        var localDy = tokenY - VOID_CENTER.y;
        var distFromCenter = dist(tokenX, tokenY, VOID_CENTER.x, VOID_CENTER.y);

        // Store token positions in a circular buffer (150ms buffer)
        lagBuffer.push({ x: tokenX, y: tokenY, t: now });

        // Remove samples older than SYRUP_LAG + margin
        while (lagBuffer.length > 0 && (now - lagBuffer[0].t) > SYRUP_LAG + 50) {
            lagBuffer.shift();
        }

        if (inVoid && lagBuffer.length >= 2) {
            var oldSample = lagBuffer[0];
            var age = now - oldSample.t;
            var progress = clamp(age / SYRUP_LAG, 0, 1);

            // Non-linear easing: heavy resistance at start (like pulling through syrup)
            var easedProgress = Math.pow(progress, 0.45);

            cursorX = oldSample.x + (tokenX - oldSample.x) * easedProgress;
            cursorY = oldSample.y + (tokenY - oldSample.y) * easedProgress;
        } else if (inVoid && lagBuffer.length === 1) {
            cursorX = lagBuffer[0].x;
            cursorY = lagBuffer[0].y;
        } else {
            // Normal lerp outside void
            var lerp = LERP_SPEED * dt;
            cursorX += (tokenX - cursorX) * lerp;
            cursorY += (tokenY - cursorY) * lerp;
        }

        // Visual updates
        $token.style.left = tokenX + 'px';
        $token.style.top  = tokenY + 'px';
        $cursor.style.left = cursorX + 'px';
        $cursor.style.top  = cursorY + 'px';

        // Visual feedback
        if (inVoid) {
            $voidZone.classList.add('active');
            $ring.classList.add('visible');
            $pressure.classList.add('active');
            document.body.style.setProperty('--mx', (mouseX / window.innerWidth * 100) + '%');
            document.body.style.setProperty('--my', (mouseY / window.innerHeight * 100) + '%');

            var depth = distFromCenter / VOID_RADIUS;
            $vignette.classList.toggle('heavy', depth > 0.3);
        } else {
            $voidZone.classList.remove('active');
            $ring.classList.remove('visible');
            $pressure.classList.remove('active');
            $vignette.classList.remove('heavy');
        }

        // HUD latency display
        if (inVoid) {
            var displayLag = Math.round(SYRUP_LAG + SYRUP_LAG * distFromCenter / VOID_RADIUS);
            displayLag = clamp(displayLag, SYRUP_LAG, 300);
            $hudValue.textContent = displayLag + 'ms';
            $hudFill.style.width = clamp((displayLag / 300) * 100, 0, 100) + '%';
        } else {
            $hudValue.textContent = '0ms';
            $hudFill.style.width = '0%';
        }

        // Token/cursor opacity based on depth
        if (inVoid) {
            var d = distFromCenter / VOID_RADIUS;
            $token.style.opacity = 1 - d * 0.4;
            $cursor.style.opacity = 0.6 + (1 - d) * 0.4;
        } else {
            $token.style.opacity = 1;
            $cursor.style.opacity = 1;
        }
    }

    requestAnimationFrame(loop);
})();
</script>
</body>
</html>
