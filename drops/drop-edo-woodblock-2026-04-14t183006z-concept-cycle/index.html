<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edo Woodblock Drop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            position: relative;
            height: 100vh;
            width: 100vw;
        }
        
        #webcam-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        #webcam-feed {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) sepia(100%) hue-rotate(240deg) saturate(200%);
        }
        
        #fallback-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
            filter: grayscale(100%) sepia(100%) hue-rotate(240deg) saturate(200%);
        }
        
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
        }
        
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        #despair-meter {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 200px;
            height: 20px;
            background-color: rgba(0, 0, 0, 0.5);
            border: 1px solid #6a5acd;
            z-index: 10;
        }
        
        #despair-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4b0082, #8a2be2, #9370db);
            transition: width 0.3s ease;
        }
        
        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
            text-align: center;
            z-index: 20;
            opacity: 0;
            transition: opacity 1s ease;
        }
        
        #salt-texture {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 15;
            display: none;
            background-image: url('salt-texture.png');
            background-size: cover;
        }
        
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #6a5acd;
            font-size: 14px;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="webcam-container">
        <video id="webcam-feed" autoplay muted playsinline></video>
        <img id="fallback-image" src="fallback.jpg" alt="Fallback image">
    </div>
    
    <div id="canvas-container">
        <canvas id="reflection-canvas"></canvas>
        <canvas id="effects-canvas"></canvas>
    </div>
    
    <div id="despair-meter">
        <div id="despair-fill"></div>
    </div>
    
    <div id="message">You were already gone</div>
    
    <div id="salt-texture"></div>
    
    <div id="instructions">
        Anchor: Hold to drain despair<br>
        Snap: Quick scroll to trigger click
    </div>

    <script>
        // Main JavaScript implementation will go here
    </script>
</body>
</html>
