<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Indigo Breath</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000000;
            font-family: 'Arial', sans-serif;
            cursor: none;
        }

        #canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        #instructions {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(11, 16, 38, 0.7);
            font-size: 18px;
            text-align: center;
            pointer-events: none;
            opacity: 0.7;
            transition: opacity 2s ease;
        }

        #kanji {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 120px;
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }

        #print {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="instructions">Hover to breathe</div>
    <div id="kanji">水</div>
    <img id="print" src="" alt="Ukiyo-e Print">

    <script>
        <script src="script.js"></script>
    </script>
</body>
</html>
