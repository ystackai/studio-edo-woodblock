<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>The Steaming Soul — Mist-to-Clarity Reveal Engine</title>

<!-- Preload serif font -->
<link rel="preload" href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap" as="style">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap">

<style>
/* ============================================================
   CSS VARIABLES — Mist vs Clarity states (hard 150ms cutoff)
    All timing governed by --reveal-duration = 150ms
    FFCT ≤ 150ms is the absolute ship bar.
    ============================================================ */
:root {
  --bg-deep: #0a0608;
  --bg-card: #120e10;
  --ink: #1a1418;
  --paper: #f5ece0;
  --vermillion: #c94030;
  --vermillion-glow: rgba(201, 64, 48, 0.3);
  --ink-wash: #2c2420;
  --gold-leaf: #d4a856;
  --gold-glow: rgba(212, 168, 86, 0.25);
   --mist-blue: #8a9bb0;
   --steam-white: rgba(245, 236, 224, 0.6);

   /* Mist state — desaturated, blurred */
   --mist-blur: 14px;
   --mist-saturate: 0.15;
   --mist-contrast: 0.6;
   --mist-brightness: 0.82;
   --mist-opacity: 0.72;

   /* Clarity state — vibrant, sharp */
   --clarity-blur: 0px;
   --clarity-saturate: 1.35;
   --clarity-contrast: 1.1;
   --clarity-brightness: 1.05;
   --clarity-opacity: 1;

   /* The hard cutoff — exactly 150ms */
   --reveal-duration: 150ms;

   /* Steam config */
   --steam-count: 6;

   /* UI fade */
   --ui-fade-duration: 600ms;
}

/* ============================================================
   RESET & BASE
    ============================================================ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html {
  background: var(--bg-deep);
   -webkit-font-smoothing: antialiased;
  font-family: "Noto Serif JP", "Hiragino Mincho ProN", "Yu Mincho", serif;
  scroll-behavior: smooth;
}

body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
  background:
    radial-gradient(ellipse 80% 60% at 50% 30%, rgba(201,64,48,0.05) 0%, transparent 70%),
    var(--bg-deep);
}

/* ============================================================
   PAGE HEADER — fades after soul-settle (custom event)
    ============================================================ */
.page-header {
  position: fixed;
  top: env(safe-area-inset-top, 16px);
  left: 0; right: 0;
  text-align: center;
  padding: 28px 16px 12px;
  z-index: 50;
  transition: opacity var(--ui-fade-duration) ease-out,
              transform var(--ui-fade-duration) ease-out;
  will-change: opacity, transform;
}

.page-header h1 {
  font-size: clamp(14px, 3.5vw, 20px);
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--paper);
  opacity: 0.85;
  font-weight: 400;
}

.page-header .subtitle {
  font-size: clamp(10px, 2.5vw, 13px);
  color: var(--mist-blue);
  margin-top: 4px;
  letter-spacing: 0.12em;
  opacity: 0.6;
}

/* Fade UI once any card achieves clarity-lock */
body.clarity-reached .page-header {
  opacity: 0;
  transform: translateY(-10px);
  pointer-events: none;
}

/* ============================================================
   SCROLL SPACER
    ============================================================ */
.scroll-space {
  width: 100%;
  height: 35vh;
  flex-shrink: 0;
}

/* ============================================================
   CARD SCENE CONTAINER
    ============================================================ */
.card-scene {
  position: relative;
  width: min(90vw, 420px);
  aspect-ratio: 3 / 4;
  margin: 0 auto 10vh;
}

/* ============================================================
   THE CARD — Mist-to-Clarity transition (hard 150ms lock)
    Default state = mist. Toggle .clear for full clarity.
    Transition fires only on class ADD, never remove.
    ============================================================ */
.card {
  position: relative;
  width: 100%;
  height: 100%;
  border-radius: 6px;
  overflow: hidden;
  background: var(--bg-card);
  box-shadow:
     0 2px 40px rgba(0,0,0,0.5),
     0 0 80px rgba(201,64,48,0.02);

   /* Only filter transitions — no layout properties affected */
  will-change: filter;
  transition-duration: var(--reveal-duration);
  transition-timing-function: linear;

   /* Mist state (default) — always applied initially */
  filter:
    blur(var(--mist-blur))
    saturate(var(--mist-saturate))
    contrast(var(--mist-contrast))
    brightness(var(--mist-brightness));
  opacity: var(--mist-opacity);

   /* No transition delay on initialization */
  transition-delay: 0ms;
}

/* The .clear class IS the 150ms soul anchor.
   Added by JS when IntersectionObserver fires.
   Only adds transition-duration; base filters set here. */
.card.clear {
  filter:
    blur(var(--clarity-blur))
    saturate(var(--clarity-saturate))
    contrast(var(--clarity-contrast))
    brightness(var(--clarity-brightness));
  opacity: var(--clarity-opacity);
}

/* Subtle card border in mist — transitions to gold on clarity */
.card::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 6px;
  border: 1px solid rgba(245,236,224,0.08);
  z-index: 20;
  pointer-events: none;
  opacity: var(--mist-opacity);
  transition: border-color var(--reveal-duration) linear,
              opacity var(--reveal-duration) linear;
}

.card.clear::before {
  border-color: rgba(212,168,86,0.18);
  opacity: 1;
}

/* ============================================================
   SVG ARTWORK
    ============================================================ */
.card svg.ukiyo-scene {
  width: 100%;
  height: 100%;
  display: block;
  backface-visibility: hidden; /* GPU layer promotion */
}

/* ============================================================
   MIST OVERLAY — Atmospheric noise texture on top of art
    Dissolves with the clarity transition
    ============================================================ */
.mist-overlay {
  position: absolute;
  inset: 0;
  z-index: 18;
  pointer-events: none;
  background: radial-gradient(ellipse at 50% 45%,
    rgba(138, 155, 176, 0.25) 0%,
    rgba(10, 6, 8, 0.35) 70%);
  opacity: 1;
  transition: opacity var(--reveal-duration) linear;
}

.card.clear .mist-overlay {
  opacity: 0;
}

/* ============================================================
   STEAM WISPS — CSS-only animated wisps, post-clarity only
    Appear with a staggered fade-in AFTER clarity lock fires.
    No JS animation loop — pure CSS keyframes for perf.
    ============================================================ */
.steam-layer {
  position: absolute;
  inset: -15% 5% 8%;
  z-index: 22;
  pointer-events: none;
  overflow: visible;
}

.wisp {
  position: absolute;
  border-radius: 50%;
  filter: blur(12px);
  opacity: 0;
  will-change: transform, opacity;
   /* No transition — only animate ONCE after clarity */
}

/* Wisp sizes and positions vary per wisp */
.wisp-1 { width: 40px; height: 90px; left: 25%; bottom: 38%; background: var(--steam-white); }
.wisp-2 { width: 30px; height: 70px; left: 40%; bottom: 42%; background: rgba(245,236,224,0.45); }
.wisp-3 { width: 50px; height: 100px; left: 55%; bottom: 35%; background: rgba(245,236,224,0.35); }
.wisp-4 { width: 35px; height: 80px; left: 35%; bottom: 45%; background: rgba(245,236,224,0.3); }
.wisp-5 { width: 25px; height: 60px; left: 62%; bottom: 40%; background: rgba(245,236,224,0.4); }
.wisp-6 { width: 45px; height: 95px; left: 48%; bottom: 32%; background: rgba(245,236,224,0.25); }

/* Steam wisps only animate when card achieves clarity */
.card.clear ~ .steam-layer .wisp {
  animation: steamRise 2.5s ease-out forwards;
}

.card.clear ~ .steam-layer .wisp-1 { animation-delay: 0ms; }
.card.clear ~ .steam-layer .wisp-2 { animation-delay: 80ms; }
.card.clear ~ .steam-layer .wisp-3 { animation-delay: 160ms; }
.card.clear ~ .steam-layer .wisp-4 { animation-delay: 60ms; }
.card.clear ~ .steam-layer .wisp-5 { animation-delay: 200ms; }
.card.clear ~ .steam-layer .wisp-6 { animation-delay: 120ms; }

@keyframes steamRise {
   0% {
    opacity: 0;
    transform: translateY(0) scale(0.8);
   }
   15% {
    opacity: 0.7;
   }
   50% {
    opacity: 0.35;
    transform: translateY(-60px) scale(1.1) translateX(8px);
   }
   100% {
    opacity: 0;
    transform: translateY(-140px) scale(1.4) translateX(-12px);
   }
}

/* ============================================================
   CARD FOOTER — Title area beneath art
    ============================================================ */
.card-footer {
  padding: 20px 8px 0;
  text-align: center;
  transition: opacity var(--ui-fade-duration) ease-out,
              transform var(--ui-fade-duration) ease-out;
}

body.clarity-reached .card-footer:not(.revealed) {
  opacity: 0.4;
  transform: translateY(4px);
}

.card-footer h2 {
  font-size: clamp(14px, 3vw, 18px);
  color: var(--paper);
  letter-spacing: 0.08em;
  font-weight: 400;
}

.card-footer h2 .jp-title {
  display: block;
  font-size: clamp(20px, 5vw, 30px);
  color: var(--gold-leaf);
  margin-bottom: 4px;
  letter-spacing: 0.15em;
}

.card-footer .artist {
  font-size: clamp(9px, 2vw, 12px);
  color: var(--mist-blue);
  margin-top: 6px;
  opacity: 0.5;
  letter-spacing: 0.1em;
}

/* ============================================================
   SCROLL HINT
    ============================================================ */
.scroll-hint {
  position: fixed;
  bottom: env(safe-area-inset-bottom, 20px);
  left: 0; right: 0;
  text-align: center;
  color: var(--mist-blue);
  font-size: 11px;
  letter-spacing: 0.2em;
  opacity: 0.5;
  transition: opacity 400ms ease-out;
  pointer-events: none;
  z-index: 50;
}

/* ============================================================
   CLARITY COUNTER — tiny badge showing FFCT metric
    Shows for first clarity-lock event only
    ============================================================ */
.ffct-badge {
  position: fixed;
  top: env(safe-area-inset-top, 16px);
  right: 16px;
  background: rgba(201,64,48,0.15);
  border: 1px solid rgba(201,64,48,0.3);
  border-radius: 4px;
  padding: 6px 12px;
  font-size: 10px;
  color: var(--vermillion);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  opacity: 0;
  transition: opacity 300ms ease-out;
  z-index: 60;
  pointer-events: none;
}

.ffct-badge.show {
  opacity: 1;
}

/* ============================================================
   RESPONSIVE
    ============================================================ */
@media (max-width: 480px) {
   .card-scene { width: 92vw; aspect-ratio: 3/4; }
   .card-footer h2 .jp-title { font-size: 22px; }
}

/* Reduce motion for users who prefer it */
@media (prefers-reduced-motion: reduce) {
   :root { --reveal-duration: 0ms; }
   .wisp { animation-duration: 0ms !important; opacity: 0; }
}
</style>
</head>

<!-- ============================================================
     JAVASCRIPT - The Mist-to-Clarity Reveal Engine
      Core features:
        1. IntersectionObserver -> toggles .clear at T+0ms (150ms FFCT)
        2. CustomEvent dispatch: 'soul-reveal' + 'clarity-lock'
        3. Audio engine: warm steam hum triggered at clarity lock
        4. Performance-safe: CSS filters only, no layout thrashing
     ============================================================ -->
<script>
(function() {
   'use strict';

   /* ===== CONFIGURATION ===== */
  var REVEAL_DURATION = 150; // ms - the absolute ship bar
  var AUDIO_THRESHOLD_MS = 50; // audio fires within 50ms of visual lock
  var OBSERVER_THRESHOLD = 0.4; // 40% viewport visible

   /* ===== AUDIO ENGINE ===== */
  var audioCtx = null;
  var steamGainNode = null;
  var humOscillators = [];
  var soulRevealed = false;
  var globalClarityReached = false;

   /**
    * createSteamHum - Boot the Web AudioContext on first interaction.
    * Creates a warm low-frequency hum (55->82Hz rise) that peaks at 150ms,
    * matching the visual clarity transition exactly.
    */
  function createSteamHum() {
    if (audioCtx) return;

    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();

       /* Master gain for steam sound - fades in to match reveal */
      steamGainNode = audioCtx.createGain();
      steamGainNode.gain.setValueAtTime(0, audioCtx.currentTime);
      steamGainNode.gain.linearRampToValueAtTime(0.12, audioCtx.currentTime + REVEAL_DURATION / 1000);
      steamGainNode.connect(audioCtx.destination);

       /* Primary warm hum - bass ~55Hz rising to 82Hz at T+150ms */
      var hum = audioCtx.createOscillator();
      hum.type = 'sine';
      hum.frequency.setValueAtTime(55, audioCtx.currentTime);
      hum.frequency.exponentialRampToValueAtTime(82, audioCtx.currentTime + REVEAL_DURATION / 1000);
      hum.connect(steamGainNode);
      hum.start();
      humOscillators.push(hum);

       /* Sub-harmonic warmth - ~33Hz felt more than heard */
      var sub = audioCtx.createOscillator();
      sub.type = 'sine';
      sub.frequency.setValueAtTime(33, audioCtx.currentTime);
      sub.connect(steamGainNode);
      sub.start();
      humOscillators.push(sub);

       /* Gentle high shimmer - ~440Hz barely audible warmth */
      var shimmer = audioCtx.createOscillator();
      shimmer.type = 'sine';
      shimmer.frequency.setValueAtTime(440, audioCtx.currentTime);
      shimmer.detune.setValueAtTime(12, audioCtx.currentTime);

      var shimGain = audioCtx.createGain();
      shimGain.gain.setValueAtTime(0.03, audioCtx.currentTime);
      shimmer.connect(shimGain);
      shimGain.connect(steamGainNode);
      shimmer.start();
      humOscillators.push(shimmer);

      soulRevealed = true;

    } catch (e) {
      console.warn('[Steaming Soul] Audio unavailable:', e.message || e);
    }
  }

   /* Resume audio context after user gesture */
  function resumeAudio() {
    if (audioCtx && audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
  }

  document.addEventListener('click', resumeAudio, { once: true });
  document.addEventListener('touchstart', resumeAudio, { once: true });


   /* ===== REVEAL ENGINE ===== */

   /**
    * toggleClarity - The core reveal mechanism.
    * Removes .clear (to reset), forces reflow, then adds .clear.
    * Fires CustomEvents: 'soul-reveal' and 'clarity-lock'.
    * @param {HTMLElement} card - The .card element to reveal
    * @param {HTMLElement} scene - The parent .card-scene element
    */
  function toggleClarity(card, scene) {
    if (card.classList.contains('clear')) return;

     /* Remove old class to reset transition state */
    card.classList.remove('clear');

     /* Force reflow so CSS transition fires cleanly on next frame */
    void card.offsetWidth;

     /* ADD .clear - triggers the 150ms mist-to-clarity transition */
    card.classList.add('clear');

     /* === Event Dispatch ===
      * Both events fire synchronously within the same
      * microtask, guaranteeing downstream hooks receive
      * them before the next paint.
      */

     /* 'soul-reveal' - fired as soon as .clear class is added */
    var soulRevealEvent = new CustomEvent('soul-reveal', {
      bubbles: true,
      cancelable: true,
      detail: {
        cardId: card.id || null,
        group: scene ? scene.dataset.revealGroup : null,
        timestamp: performance.now(),
        revealDurationMs: REVEAL_DURATION,
        message: 'Soul revealed - mist dissolving'
       }
     });

    if (scene) {
      scene.dispatchEvent(soulRevealEvent);
    }

     /* 'clarity-lock' - fired after .clear has been applied */
    requestAnimationFrame(function() {
      var clarityLockEvent = new CustomEvent('clarity-lock', {
        bubbles: true,
        cancelable: true,
        detail: {
          cardId: card.id || null,
          group: scene ? scene.dataset.revealGroup : null,
          timestamp: performance.now(),
          revealDurationMs: REVEAL_DURATION,
          message: 'Clarity locked - soul visible'
         }
       });

      if (scene) {
        scene.dispatchEvent(clarityLockEvent);
      }

       /* === Trigger audio within 50ms of visual lock === */
      requestAnimationFrame(function() {
        createSteamHum();
      });

       /* === Global state - first card achieves clarity === */
      if (!globalClarityReached) {
        globalClarityReached = true;
        document.body.classList.add('clarity-reached');

         /* Show FFCT badge on first lock */
        var badge = document.getElementById('ffctBadge');
        if (badge) {
          badge.classList.add('show');
          setTimeout(function() {
            badge.classList.remove('show');
          }, 3000);
        }
      }
    });
  }


   /* ===== INTERSECTION OBSERVER SETUP ===== */
  var cardScenes = document.querySelectorAll('.card-scene');

  var revealObserver = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (!entry.isIntersecting) return;

      var scene = entry.target;
      var card = scene.querySelector('.card');

      if (!card || card.classList.contains('clear')) return;

       /* Trigger the reveal - .clear toggle fires CSS transition */
      toggleClarity(card, scene);
    });
  }, {
    root: null,
    threshold: OBSERVER_THRESHOLD
  });

  cardScenes.forEach(function(scene) {
    revealObserver.observe(scene);
  });


   /* ===== SCROLL HINT HIDE ===== */
  var scrollHint = document.getElementById('scrollHint');
  if (scrollHint) {
    var hintHidden = false;
    window.addEventListener('scroll', function() {
      if (!hintHidden && window.scrollY > 50) {
        scrollHint.style.opacity = '0';
        hintHidden = true;
      }
    }, { passive: true });
  }


   /* ===== PARALLAX - subtle card offset, GPU-accelerated ===== */
  var cardElements = document.querySelectorAll('.card');
  var ticking = false;

  window.addEventListener('scroll', function() {
    if (!ticking) {
      requestAnimationFrame(function() {
        cardElements.forEach(function(card) {
          var rect = card.getBoundingClientRect();
          var center = rect.top + rect.height / 2;
          var viewCenter = window.innerHeight / 2;
          var offset = (center - viewCenter) * 0.015;

          if (card.classList.contains('clear')) {
             /* Only translateY - no width/height changes = no layout thrashing */
            card.style.transform = 'translateY(' + offset + 'px)';
          } else {
            card.style.transform = '';
          }
        });
        ticking = false;
      });
      ticking = true;
    }
  }, { passive: true });


   /* ===== PUBLIC API — Event Listener Examples ===== */
   /*
    * Downstream modules can hook into these events:
    *
    *   document.addEventListener('soul-reveal', function(e) {
    *     console.log('Soul revealed!', e.detail);
    *   });
    *
    *   document.addEventListener('clarity-lock', function(e) {
    *     console.log('Clarity locked at T+', performance.now() - e.detail.timestamp, 'ms');
    *   });
    *
    * Both events bubble and are cancelable. Details include:
    *   cardId, group, timestamp, revealDurationMs, message
    */

})();
</script>
