<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>The Steaming Soul</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: #0a0a0f; font-family: 'Georgia', serif;
}

#gallery {
  width: 100%; height: 100vh; overflow-y: auto; overflow-x: hidden;
  scroll-snap-type: y mandatory; -webkit-overflow-scrolling: touch;
}
#gallery::-webkit-scrollbar { display: none; }
#gallery { scrollbar-width: none; }

.card {
  position: relative; width: 100%; height: 100vh;
  scroll-snap-align: start; flex-shrink: 0; overflow: hidden;
}

/* ── Mist vs Clarity (hard 150ms cutoff) ── */
.card .art {
  position: absolute; inset: 0; z-index: 3;
  filter: saturate(0.15) brightness(0.6) blur(8px);
  transition: filter 150ms steps(6, end);
  will-change: filter;
}
.card.clear .art { filter: saturate(1) brightness(1) blur(0); }

/* Mist overlay gradient */
.mist-overlay {
  position: absolute; inset: 0; z-index: 2; pointer-events: none;
  background: linear-gradient(
    to bottom,
    rgba(220,215,200,0.45) 0%,
    rgba(235,230,218,0.6) 30%,
    rgba(210,205,195,0.7) 60%,
    rgba(195,190,180,0.8) 100%
  );
  opacity: 1; transition: opacity 150ms steps(6, end);
}
.card.clear .mist-overlay { opacity: 0; }

/* Steam canvas behind art */
.steam-canvas {
  position: absolute; inset: 0; z-index: 1; pointer-events: none;
}

.art svg { width: 100%; height: 100%; display: block; }

/* ── UI overlays ── */
.ui-overlay {
  position: absolute; top: 0; left: 0; right: 0; z-index: 10;
  padding: clamp(20px, 5vh, 48px); pointer-events: none;
}
.card-title {
  font-size: clamp(1.4rem, 4vw, 3.2rem); color: #fffdf7;
  text-shadow: 0 2px 20px rgba(0,0,0,0.8), 0 0 40px rgba(180,60,30,0.5);
  font-weight: bold; letter-spacing: 0.05em;
  opacity: 0; transform: translateY(12px);
  transition: opacity 150ms steps(6,end), transform 150ms steps(6,end);
}
.card-subtitle {
  font-size: clamp(0.7rem, 1.8vw, 1.1rem); color: rgba(255,245,230,0.8);
  text-shadow: 0 1px 10px rgba(0,0,0,0.9); margin-top: 6px; letter-spacing: 0.12em;
  opacity: 0; transform: translateY(8px);
  transition: opacity 150ms steps(6,end), transform 150ms steps(6,end);
}
.card.clear .card-title,
.card.clear .card-subtitle { opacity: 1; transform: translateY(0); }

/* Post-settlement fade (~500ms after reveal) */
.card.settled .card-title,
.card.settled .card-subtitle { opacity: 0.08; transform: translateY(-10px); }

/* ── Indicator dots ── */
#indicators {
  position: fixed; bottom: clamp(12px, 3vh, 24px); left: 50%;
  transform: translateX(-50%); z-index: 20; display: flex; gap: 8px;
}
.indicator {
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(255,245,230,0.3); transition: all 150ms steps(6,end);
}
.indicator.active { background: rgba(255,200,150,0.8); transform: scale(1.4); }

/* ── Scroll hint ── */
.scroll-hint {
  position: fixed; bottom: clamp(36px, 7vh, 64px); left: 50%;
  transform: translateX(-50%); z-index: 20; color: rgba(255,245,230,0.5);
  font-size: clamp(0.6rem, 1.4vw, 0.85rem); letter-spacing: 0.2em;
  animation: pulse 2s ease-in-out infinite; pointer-events: none;
}
@keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:0.7} }

/* ── Responsive: face legible ≥ 720p ── */
@media (max-width:480px){ .art svg{max-height:100vh} }
</style>
</head>
<body>

<div id="gallery">

<!-- Indicator dots -->
<div id="indicators">

<!-- Scroll hint -->
<div class="scroll-hint" id="scrollHint">SCROLL DOWN</div>

<script>
(function() {
  'use strict';

  // ── Audio Engine ──
  var audioCtx = null;
  var activeOscillators = {};

  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  function playRevealHum(cardIndex) {
    ensureAudio();
    stopCardHum(cardIndex);

    var now = audioCtx.currentTime;

    // Warm rising hum: 180Hz → 320Hz over 400ms, settling at 260Hz
    var osc1 = audioCtx.createOscillator();
    var gain1 = audioCtx.createGain();
    osc1.type = 'sine';
    osc1.frequency.setValueAtTime(180, now);
    osc1.frequency.exponentialRampToValueAtTime(320, now + 0.4);
    osc1.frequency.exponentialRampToValueAtTime(260, now + 1.0);
    gain1.gain.setValueAtTime(0, now);
    gain1.gain.linearRampToValueAtTime(0.12, now + 0.05);
    gain1.gain.exponentialRampToValueAtTime(0.06, now + 1.2);

    // Sub bass warmth
    var osc2 = audioCtx.createOscillator();
    var gain2 = audioCtx.createGain();
    osc2.type = 'triangle';
    osc2.frequency.setValueAtTime(85, now);
    osc2.frequency.linearRampToValueAtTime(120, now + 0.6);
    gain2.gain.setValueAtTime(0, now);
    gain2.gain.linearRampToValueAtTime(0.08, now + 0.04);
    gain2.gain.exponentialRampToValueAtTime(0.03, now + 1.5);

    // Gentle overtone shimmer
    var osc3 = audioCtx.createOscillator();
    var gain3 = audioCtx.createGain();
    osc3.type = 'sine';
    osc3.frequency.setValueAtTime(420, now);
    osc3.frequency.exponentialRampToValueAtTime(560, now + 0.3);
    osc3.frequency.linearRampToValueAtTime(500, now + 0.8);
    gain3.gain.setValueAtTime(0, now);
    gain3.gain.linearRampToValueAtTime(0.025, now + 0.06);
    gain3.gain.exponentialRampToValueAtTime(0.008, now + 1.0);

    osc1.connect(gain1).connect(audioCtx.destination);
    osc2.connect(gain2).connect(audioCtx.destination);
    osc3.connect(gain3).connect(audioCtx.destination);

    osc1.start(now);
    osc2.start(now);
    osc3.start(now);

    setTimeout(function() { stopCardHum(cardIndex); }, 2000);
    activeOscillators[cardIndex] = [osc1, osc2, osc3];
  }

  function stopCardHum(cardIndex) {
    var oscs = activeOscillators[cardIndex];
    if (oscs) {
      try {
        var now = audioCtx ? audioCtx.currentTime : 0;
        oscs.forEach(function(o) { o.stop(now + 0.1); });
      } catch(e) {}
      delete activeOscillators[cardIndex];
    }
  }

  // ── Steam Particle System ──
  function SteamSystem(canvas) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.particles = [];
    this.running = false;
    this.rafId = null;
    this.w = 0;
    this.h = 0;
  }

  SteamSystem.prototype.resize = function() {
    var dpr = Math.min(window.devicePixelRatio || 1, 2);
    var rect = this.canvas.getBoundingClientRect();
    this.canvas.width = rect.width * dpr;
    this.canvas.height = rect.height * dpr;
    this.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    this.w = rect.width;
    this.h = rect.height;
  };

  SteamSystem.prototype.start = function() {
    if (this.running) return;
    this.running = true;
    this.resize();
    this.loop();
  };

  SteamSystem.prototype.stop = function() {
    this.running = false;
    if (this.rafId) cancelAnimationFrame(this.rafId);
    this.ctx.clearRect(0, 0, this.w || 1, this.h || 1);
  };

  SteamSystem.prototype.spawn = function(count) {
    for (var i = 0; i < count; i++) {
      var x = Math.random() * this.w;
      // Start from below the face area (lower portion of card), never above 90% height
      var y = this.h * 0.5 + Math.random() * this.h * 0.35;
      this.particles.push({
        x: x,
        y: y,
        vx: (Math.random() - 0.5) * 0.4,
        vy: -(0.3 + Math.random() * 0.6), // rises upward
        life: 1.0,
        decay: 0.003 + Math.random() * 0.005,
        radius: 8 + Math.random() * 24
      });
    }
  };

  SteamSystem.prototype.loop = function() {
    var self = this;
    if (!this.running) return;
    this.ctx.clearRect(0, 0, this.w, this.h);

    // Periodic particle spawning
    if (Math.random() < 0.35) {
      this.spawn(Math.floor(1 + Math.random() * 2));
    }

    var faceCeiling = this.h * 0.4; // Remove particles that reach face area

    for (var i = this.particles.length - 1; i >= 0; i--) {
      var p = this.particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.life -= p.decay;
      p.radius += 0.08;

      // Remove if faded out or if it reached face area (top portion)
      if (p.life <= 0 || p.y < faceCeiling) {
        this.particles.splice(i, 1);
        continue;
      }

      // Warm steam wisp — soft radial gradient
      var alpha = p.life * 0.15;
      var grad = this.ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.radius);
      grad.addColorStop(0, 'rgba(240,230,215,' + alpha + ')');
      grad.addColorStop(0.5, 'rgba(230,220,200,' + (alpha * 0.5) + ')');
      grad.addColorStop(1, 'rgba(220,210,190,0)');

      this.ctx.fillStyle = grad;
      this.ctx.beginPath();
      this.ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
      this.ctx.fill();
    }

    this.rafId = requestAnimationFrame(function() { self.loop(); });
  };

  // ── FFCT Measurement (PerformanceObserver) ──
  var ffctMarkers = new Map();
  var revealCounters = {};

  // Global PerformanceObserver for long-task detection (ship-bar validation)
  var longTaskObserver = new PerformanceObserver(function(list) {
    list.getEntries().forEach(function(entry) {
      if (entry.duration > 50) {
        console.log('[Steaming Soul] LongTask warning: ' + entry.duration.toFixed(1) + 'ms');
      }
    });
  });
  longTaskObserver.observe({ entryTypes: ['longtask'] });

  function logFFCT(cardIndex, durationMs) {
    var status = durationMs <= 150 ? '\u2705 PASS' : '\u274C FAIL';
    var color = durationMs <= 150 ? '#4ade80' : '#f87171';
    console.log(
      '%c[Steaming Soul] FFCT Card ' + cardIndex + ': ' + durationMs.toFixed(1) + 'ms ' + status,
      'color: ' + color + '; font-weight:bold; font-size:13px'
    );

    if (durationMs <= 150) {
      console.log('%c\u25CE Ship bar met: visibility lock within 150ms budget', 'font-weight:bold;');
    } else {
      console.log('%c\u25CE SHIP BAR FAILED: exceeded 150ms clarity budget', 'font-weight:bold; color:#f87171;');
    }

    ffctMarkers.set(cardIndex, durationMs);
    revealCounters[cardIndex] = (revealCounters[cardIndex] || 0) + 1;
  }

  // ── Initialize steam systems per card ──
  var steamSystems = [];
  document.querySelectorAll('.steam-canvas').forEach(function(canvas) {
    steamSystems.push(new SteamSystem(canvas));
  });

  // ── Intersection Observer + Reveal Logic ──
  var cards = document.querySelectorAll('.card');
  var indicators = document.querySelectorAll('.indicator');
  var settledCards = new Set();

  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting && !entry.target.dataset.revealed) {
        entry.target.dataset.revealed = 'true';
        revealCard(entry.target);
      }
    });
  }, {
    root: null,
    rootMargin: '-10% 0px -10% 0px',
    threshold: [0.1]
  });

  cards.forEach(function(card) { observer.observe(card); });

  function revealCard(card) {
    var cardIndex = parseInt(card.dataset.index);
    var startTime = performance.now();
    var cssDuration = 150; // ms — the hard cutoff lock

    // 1. Mark FFCT start
    performance.mark('steaming-soul-ffct-start');

    // 2. Apply clarity class — CSS steps(6,end) fires exactly 150ms from mist to clear
    card.classList.add('clear');

    // 3. After exactly 150ms: visual lock achieved, trigger post-lock effects
    var lockTimeout = setTimeout(function() {
      var duration = performance.now() - startTime;

      // Steam wisps (post-reveal, behind/around subject area only)
      steamSystems[cardIndex].start();
      setTimeout(function() { steamSystems[cardIndex].spawn(30); }, 50);

      // Audio cue — warm rising hum within 50ms of visual lock
      playRevealHum(cardIndex);

      // FFCT measurement logged to dev console for ship-bar validation
      logFFCT(cardIndex, duration);

      // Update indicator dots
      indicators.forEach(function(ind, i) {
        ind.classList.toggle('active', i === cardIndex);
      });

      // Hide scroll hint after first reveal
      if (cardIndex === 0) {
        var hint = document.getElementById('scrollHint');
        if (hint) hint.style.display = 'none';
      }

    }, cssDuration);

    // 4. UI fade ~500ms post-reveal
    var settleTimeout = setTimeout(function() {
      card.classList.add('settled');
      settledCards.add(cardIndex);
    }, cssDuration + 500);
  }

  // ── Scroll indicator update (which card is currently snapped) ──
  var scrollObserver = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        var idx = parseInt(entry.target.dataset.index);
        indicators.forEach(function(ind, i) {
          ind.classList.toggle('active', i === idx);
        });
      }
    });
  }, { root: document.getElementById('gallery'), threshold: 0.5 });

  cards.forEach(function(card) { scrollObserver.observe(card); });

  // ── Touch/click to init audio context on first interaction ──
  function initAudioOnInteraction() {
    ensureAudio();
    document.removeEventListener('touchstart', initAudioOnInteraction);
    document.removeEventListener('click', initAudioOnInteraction);
  }
  document.addEventListener('touchstart', initAudioOnInteraction, true);
  document.addEventListener('click', initAudioOnInteraction, true);

})();
</script>
