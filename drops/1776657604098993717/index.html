<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>The Steaming Soul — Mist-to-Clarity Reveal Engine</title>
<style>
/* ============================================================
   CSS VARIABLES — Mist vs Clarity (hard 150ms soul lock)
   FFCT ≤ 150ms is the absolute ship bar.
   ============================================================ */
:root {
  --bg-deep: #0a0608;
  --ink: #1a1418;
  --paper: #f5ece0;
  --vermillion: #c94030;
  --gold-leaf: #d4a856;
  --mist-tint: rgba(180, 172, 164, 0.45);

  /* Mist state — exactly per spec */
  --mist-blur: 20px;
  --mist-saturate: 0.15;

  /* Clarity state */
  --clarity-blur: 0px;
  --clarity-saturate: 1;

  /* The hard cutoff — exactly 150ms, cubic-bezier for hard edge */
  --reveal-duration: 150ms;
  --reveal-curve: cubic-bezier(0, 0, 1, 1);

  /* Grain config */
  --grain-opacity: 0.18;
}

/* ============================================================
   RESET & BASE
   ============================================================ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html {
  background: var(--bg-deep);
  -webkit-font-smoothing: antialiased;
  font-family: "Hiragino Mincho ProN", "Yu Mincho", "Noto Serif JP", "Georgia", serif;
}

body {
  min-height: 200vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
  background: var(--bg-deep);
}

/* ============================================================
   HEADER — fades after soul-settle
   ============================================================ */
.page-header {
  position: fixed;
  top: env(safe-area-inset-top, 12px);
  left: 0; right: 0;
  text-align: center;
  padding: 20px 16px 10px;
  z-index: 50;
  transition: opacity calc(var(--reveal-duration) * 4) ease-out,
              transform calc(var(--reveal-duration) * 4) ease-out;
}

.page-header h1 {
  font-size: clamp(13px, 3vw, 18px);
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--paper);
  opacity: 0.85;
  font-weight: 400;
}

.page-header .subtitle {
  font-size: clamp(9px, 2vw, 12px);
  color: var(--gold-leaf);
  margin-top: 3px;
  letter-spacing: 0.12em;
  opacity: 0.5;
}

body.clarity-reached .page-header {
  opacity: 0;
  transform: translateY(-8px);
  pointer-events: none;
}

/* ============================================================
   SCENE CONTAINER — viewport-filling card layout
   ============================================================ */
.scene-viewport {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 80px;
}

.card-scene {
  position: relative;
  width: min(85vw, 440px);
  aspect-ratio: 3 / 4;
  margin: 0 auto 12vh;
}

/* ============================================================
   THE CARD — Mist-to-Clarity (hard 150ms lock)
   Default = mist. .clear = clarity. Transition fires only on ADD.
   All filters use GPU-composited properties ONLY.
   ============================================================ */
.card {
  position: relative;
  width: 100%;
  height: 100%;
  border-radius: 4px;
  overflow: hidden;
  background: var(--bg-deep);

  /* GPU layer promotion for composited-only transition */
  will-change: filter, opacity;
  transition: filter var(--reveal-duration) var(--reveal-curve),
              opacity var(--reveal-duration) var(--reveal-curve);

  /* MIST STATE (default): fully blurred, desaturated, warm grey tinted */
  filter: blur(var(--mist-blur)) saturate(var(--mist-saturate));
  opacity: 0.85;
}

/* CLARITY STATE: sharp, vibrant */
.card.clear {
  filter: blur(var(--clarity-blur)) saturate(var(--clarity-saturate));
  opacity: 1;
}

/* Warm grey overlay on mist — fades away with clarity */
.card::after {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--mist-tint);
  z-index: 15;
  pointer-events: none;
  transition: opacity var(--reveal-duration) var(--reveal-curve);
}

.card.clear::after {
  opacity: 0;
}

/* Card border — subtle warm glow */
.card::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 4px;
  border: 1px solid rgba(245,236,224,0.06);
  z-index: 20;
  pointer-events: none;
  transition: border-color var(--reveal-duration) var(--reveal-curve),
              box-shadow var(--reveal-duration) var(--reveal-curve);
}

.card.clear::before {
  border-color: rgba(212,168,86,0.12);
}

/* ============================================================
   SVG ARTWORK — ukiyo-e scene inside card
   ============================================================ */
.card svg.ukiyo-scene {
  width: 100%;
  height: 100%;
  display: block;
  backface-visibility: hidden;
}

/* ============================================================
   SCANLINE / GRAIN TEXTURE OVERLAY — tactile atmospheric mist
   ============================================================ */
.grain-overlay {
  position: absolute;
  inset: 0;
  z-index: 16;
  pointer-events: none;
  opacity: var(--grain-opacity);
  mix-blend-mode: overlay;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  background-size: 256px 256px;
  transition: opacity var(--reveal-duration) var(--reveal-curve);
}

.card.clear .grain-overlay {
  opacity: 0.06;
}

.scanlines {
  position: absolute;
  inset: 0;
  z-index: 17;
  pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0, 0, 0, 0.04) 2px,
    rgba(0, 0, 0, 0.04) 4px
  );
  opacity: calc(var(--grain-opacity) * 1.5);
  transition: opacity var(--reveal-duration) var(--reveal-curve);
}

.card.clear .scanlines {
  opacity: 0;
}

/* ============================================================
   STEAM WISPS — appear after clarity lock
   ============================================================ */
.steam-layer {
  position: absolute;
  inset: -10%;
  z-index: 18;
  pointer-events: none;
  overflow: hidden;
}

.wisp {
  position: absolute;
  width: 40px;
  height: 80px;
  background: radial-gradient(ellipse, rgba(245,236,224,0.12) 0%, transparent 70%);
  border-radius: 50%;
  filter: blur(8px);
  opacity: 0;
  transition: opacity calc(var(--reveal-duration) * 3) ease-out;
}

.card.clear ~ .steam-layer .wisp {
  opacity: 1;
  animation: wisp-rise linear infinite;
}

@keyframes wisp-rise {
  0%   { transform: translateY(0) scaleX(1); opacity: 0; }
  15%  { opacity: 0.6; }
  50%  { opacity: 0.3; }
  100% { transform: translateY(-200px) scaleX(2.5); opacity: 0; }
}

.wisp-1 { left: 20%; bottom: 40%; animation-duration: 4s; animation-delay: 0.1s; }
.wisp-2 { left: 40%; bottom: 35%; animation-duration: 5s; animation-delay: 0.3s; width: 50px; height: 90px; }
.wisp-3 { left: 60%; bottom: 38%; animation-duration: 4.5s; animation-delay: 0.5s; }
.wisp-4 { left: 75%; bottom: 42%; animation-duration: 5.5s; animation-delay: 0.7s; width: 35px; height: 70px; }
.wisp-5 { left: 30%; bottom: 45%; animation-duration: 6s; animation-delay: 0.9s; width: 45px; height: 85px; }
.wisp-6 { left: 55%; bottom: 30%; animation-duration: 4.2s; animation-delay: 1.1s; }

/* ============================================================
   CARD FOOTER — title info, fades after soul-settle
   ============================================================ */
.card-footer {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 24px 20px 16px;
  background: linear-gradient(to top, rgba(10,6,8,0.9) 0%, transparent 100%);
  z-index: 25;
  pointer-events: none;
  opacity: 0.7;
  transition: opacity calc(var(--reveal-duration) * 4) ease-out;
}

body.clarity-reached .card-footer {
  opacity: 1;
}

.card-footer h2 {
  font-size: clamp(14px, 3vw, 18px);
  color: var(--paper);
  font-weight: 400;
  letter-spacing: 0.08em;
}

.card-footer .jp-title {
  color: var(--vermillion);
  margin-right: 6px;
}

.card-footer p {
  font-size: clamp(9px, 2vw, 11px);
  color: var(--gold-leaf);
  opacity: 0.45;
  margin-top: 3px;
  letter-spacing: 0.06em;
}

/* ============================================================
   FFCT BADGE — appears after first reveal
   ============================================================ */
.ffct-badge {
  position: fixed;
  top: env(safe-area-inset-top, 60px);
  right: 12px;
  padding: 6px 12px;
  background: rgba(10,6,8,0.85);
  border: 1px solid rgba(212,168,86,0.3);
  border-radius: 4px;
  color: var(--paper);
  font-size: 11px;
  letter-spacing: 0.05em;
  z-index: 100;
  opacity: 0;
  transform: translateY(-8px);
  transition: opacity 0.3s ease, transform 0.3s ease;
  pointer-events: none;
}

.ffct-badge.show {
  opacity: 1;
  transform: translateY(0);
}

.ffct-badge.pass { border-color: rgba(80, 200, 80, 0.6); }
.ffct-badge.fail {
  border-color: rgba(220, 50, 50, 0.9);
  animation: fail-flash 0.4s ease-in-out;
}

@keyframes fail-flash {
  0%, 100% { background: rgba(10,6,8,0.85); }
  50%      { background: rgba(220, 50, 50, 0.3); }
}

/* ============================================================
   DEBUG PANEL — hidden by default, visible via ?debug=true
   ============================================================ */
.debug-panel {
  display: none;
  position: fixed;
  bottom: 12px; left: 12px; right: 12px;
  padding: 14px;
  background: rgba(5,3,5,0.92);
  border: 1px solid rgba(200,180,160,0.2);
  border-radius: 6px;
  color: #a89a8c;
  font-size: 11px;
  font-family: "SF Mono", "Fira Code", "Consolas", monospace;
  line-height: 1.7;
  z-index: 200;
  max-height: 50vh;
  overflow-y: auto;
}

body.debug-active .debug-panel { display: block; }

.debug-entry { padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
.debug-entry:last-child { border-bottom: none; }
.debug-pass { color: #5c8a5c; }
.debug-fail { color: #c94030; animation: fail-flash 0.5s ease; }
.debug-label { color: var(--gold-leaf); }

/* ============================================================
   SCROLL HINT
   ============================================================ */
.scroll-hint {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  color: var(--paper);
  font-size: 11px;
  letter-spacing: 0.15em;
  opacity: 0.35;
  z-index: 50;
  transition: opacity 0.4s ease;
  pointer-events: none;
}

.scroll-hint.hidden { opacity: 0 !important; }

/* ============================================================
   RED FLASH OVERLAY — FFCT > 150ms violation indicator
   ============================================================ */
.ffct-flash {
  position: fixed;
  inset: 0;
  z-index: 300;
  pointer-events: none;
  background: radial-gradient(ellipse at center, rgba(220,40,40,0.15) 0%, transparent 70%);
  opacity: 0;
  transition: opacity 0.1s ease-out;
}

.ffct-flash.active {
  opacity: 1;
  animation: flash-pop 0.6s ease-out forwards;
}

@keyframes flash-pop {
  0%   { opacity: 1; }
  100% { opacity: 0; }
}

/* ============================================================
   REDUCED MOTION
   ============================================================ */
@media (prefers-reduced-motion: reduce) {
  :root { --reveal-duration: 0ms; }
  .wisp { animation-duration: 0ms !important; opacity: 0; }
}
</style>
</head>

<body>

<!-- HEADER -->
<header class="page-header">
  <h1>The Steaming Soul</h1>
  <p class="subtitle">Ukiyo-e · Mist-to-Clarity Reveal Engine</p>
</header>

<!-- FFCT BADGE -->
<div class="ffct-badge" id="ffctBadge">FFCT: —ms</div>

<!-- RED FLASH OVERLAY (FFCT violation) -->
<div class="ffct-flash" id="ffctFlash"></div>

<!-- SCENE VIEWPORT -->
<div class="scene-viewport">

  <!-- ==========================================================
       SCENE 1 — Samurai Portrait (CSS-generated ukiyo-e face)
       Core hero image for the 150ms soul lock test
       ========================================================== -->
  <section class="card-scene" data-reveal-group="samurai">
    <article class="card" id="card-samurai" role="img" aria-label="Samurai portrait — ukiyo-e style woodblock print, warrior with painted face and traditional helmet against dramatic sunset sky">

      <!-- SVG: Samurai Portrait -->
      <svg class="ukiyo-scene" viewBox="0 0 440 587" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <!-- Sky gradient — dramatic ukiyo-e sunset -->
          <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#d4764a"/>
            <stop offset="35%" stop-color="#c94030"/>
            <stop offset="65%" stop-color="#8a3020"/>
            <stop offset="100%" stop-color="#2a1818"/>
          </linearGradient>

          <!-- Face flesh tones -->
          <radialGradient id="faceGrad" cx="50%" cy="42%" r="40%">
            <stop offset="0%" stop-color="#f0dcc8"/>
            <stop offset="60%" stop-color="#e0c8a8"/>
            <stop offset="100%" stop-color="#c8a888"/>
          </radialGradient>

          <!-- Helmet lacquer -->
          <linearGradient id="helmetGrad" x1="50%" y1="0%" x2="50%" y2="100%">
            <stop offset="0%" stop-color="#3a2820"/>
            <stop offset="40%" stop-color="#1a1010"/>
            <stop offset="100%" stop-color="#0a0606"/>
          </linearGradient>

          <!-- Crest gold -->
          <radialGradient id="crestGold" cx="50%" cy="40%" r="50%">
            <stop offset="0%" stop-color="#f0d878"/>
            <stop offset="100%" stop-color="#c9a030"/>
          </radialGradient>

          <!-- Eye paint -->
          <linearGradient id="eyePaint" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#1a0808"/>
            <stop offset="50%" stop-color="#3a1010"/>
            <stop offset="100%" stop-color="#1a0808"/>
          </linearGradient>
        </defs>

        <!-- ===== SKY BACKGROUND ===== -->
        <rect width="440" height="587" fill="url(#skyGrad)"/>

        <!-- Cloud streaks — horizontal woodblock style -->
        <g opacity="0.15" fill="#f5ece0">
          <ellipse cx="80" cy="60" rx="60" ry="12"/>
          <ellipse cx="320" cy="45" rx="50" ry="8"/>
          <ellipse cx="200" cy="90" rx="70" ry="10"/>
        </g>

        <!-- ===== HELMET (KABUTO) ===== -->
        <g>
          <!-- Helmet dome -->
          <path d="M120 280 Q130 140, 220 120 Q310 140, 320 280" fill="url(#helmetGrad)" stroke="#4a3830" stroke-width="1.5"/>

          <!-- Helmet scale lines (vertical ridges) -->
          <path d="M160 140 L165 280" fill="none" stroke="#2a1a18" stroke-width="1"/>
          <path d="M200 130 L200 280" fill="none" stroke="#2a1a18" stroke-width="1"/>
          <path d="M240 135 L235 280" fill="none" stroke="#2a1a18" stroke-width="1"/>

          <!-- Helmet brim / visor -->
          <path d="M90 280 Q120 260, 220 255 Q320 260, 350 280 L340 295 Q310 305, 220 300 Q130 305, 100 295 Z" fill="#1a1010" stroke="#3a2820" stroke-width="1.5"/>

          <!-- Face mask opening (mensai) -->
          <ellipse cx="220" cy="310" rx="60" ry="40" fill="#d4b898"/>
        </g>

        <!-- ===== FACE ===== -->
        <g>
          <!-- Forehead -->
          <path d="M170 230 Q175 200, 220 190 Q265 200, 270 230 L265 280 Q260 300, 220 305 Q180 300, 175 280 Z" fill="url(#faceGrad)"/>

          <!-- Ukiyo-e eye paint — bold red eyebrows and circles -->
          <!-- Left brow arch -->
          <path d="M175 242 Q190 230, 210 238" fill="none" stroke="#1a0808" stroke-width="4.5" stroke-linecap="round"/>
          <!-- Right brow arch -->
          <path d="M230 238 Q250 230, 265 242" fill="none" stroke="#1a0808" stroke-width="4.5" stroke-linecap="round"/>

          <!-- Left eye (black paint circle with white dot) -->
          <ellipse cx="195" cy="255" rx="16" ry="12" fill="#1a0808"/>
          <circle cx="198" cy="253" r="4" fill="#f0e6d4"/>

          <!-- Right eye -->
          <ellipse cx="245" cy="255" rx="16" ry="12" fill="#1a0808"/>
          <circle cx="242" cy="253" r="4" fill="#f0e6d4"/>

          <!-- Nose bridge -->
          <path d="M218 270 Q220 285, 222 295" fill="none" stroke="#c0a080" stroke-width="2" stroke-linecap="round"/>

          <!-- Mouth — slight serious expression -->
          <path d="M200 310 Q210 307, 220 308 Q230 307, 240 310" fill="none" stroke="#a08060" stroke-width="2.5" stroke-linecap="round"/>

          <!-- Cheek shadows -->
          <ellipse cx="185" cy="290" rx="14" ry="10" fill="rgba(180,120,80,0.15)"/>
          <ellipse cx="255" cy="290" rx="14" ry="10" fill="rgba(180,120,80,0.15)"/>

          <!-- Jawline -->
          <path d="M178 300 Q180 325, 220 340 Q260 325, 262 300" fill="none" stroke="#b89878" stroke-width="1.5"/>
        </g>

        <!-- ===== NECK & SHOULDERS (Armor) ===== -->
        <g>
          <!-- Neck -->
          <rect x="195" y="340" width="50" height="50" rx="5" fill="#d4b898"/>

          <!-- Shoulder armor (sode) — layered plates -->
          <path d="M140 370 Q130 375, 120 390 L125 440 Q160 445, 200 440 L210 370" fill="#2a1818" stroke="#4a3028" stroke-width="1"/>
          <path d="M300 370 L310 370 Q315 390, 310 440 Q280 445, 240 440 L230 370" fill="#2a1818" stroke="#4a3028" stroke-width="1"/>

          <!-- Armor plate lines -->
          <line x1="125" y1="390" x2="200" y2="395" stroke="#3a2520" stroke-width="0.8"/>
          <line x1="123" y1="410" x2="200" y2="415" stroke="#3a2520" stroke-width="0.8"/>
          <line x1="126" y1="430" x2="200" y2="435" stroke="#3a2520" stroke-width="0.8"/>

          <line x1="240" y1="440" x2="317" y2="430" stroke="#3a2520" stroke-width="0.8"/>
          <line x1="240" y1="420" x2="316" y2="410" stroke="#3a2520" stroke-width="0.8"/>
          <line x1="240" y1="400" x2="313" y2="390" stroke="#3a2520" stroke-width="0.8"/>

          <!-- Gold connector rings -->
          <circle cx="220" cy="375" r="5" fill="url(#crestGold)" stroke="#a08030" stroke-width="0.5"/>
        </g>

        <!-- ===== CREST (MAED) — Shikizaka crane on helmet ===== -->
        <g transform="translate(220, 175)">
          <!-- Crest cross beams -->
          <line x1="-35" y1="0" x2="35" y2="0" stroke="#f0d878" stroke-width="4"/>
          <line x1="0" y1="-30" x2="0" y2="30" stroke="#f0d878" stroke-width="4"/>
          <!-- Crest circle -->
          <circle cx="0" cy="0" r="25" fill="none" stroke="#c9a030" stroke-width="2.5"/>

          <path d="M15 -8 Q25 -20, 30 -15 Q25 -5, 15 0" fill="none" stroke="#f0d878" stroke-width="2"/>

        <!-- ===== BACKGROUND MOUNTAINS — distant silhouette ===== -->
        <polygon points="0,587 30,480 60,510 100,460 140,500 200,440 260,490 310,450 350,480 400,460 440,490 440,587" fill="#1a0e10" opacity="0.4"/>

        <text x="36" y="490" font-size="12" fill="#f5ece0" font-family="serif" letter-spacing="4" opacity="0.3">武士</text>
      </svg>

      <!-- Grain texture overlay -->

    </article>

    <!-- Steam wisps (appear after clarity) -->
    <div class="steam-layer">
      <div class="wisp wisp-1"></div>

    <footer class="card-footer">
      <h2><span class="jp-title">武</span>Samurai — The Watchful Eye</h2>
      <p>Woodblock Print · Edo Period, c. 1850s</p>
    </footer>
  </section>

  <!-- ==========================================================
       SCENE 2 — Great Wave (Hokusai homage)
       ========================================================== -->
  <section class="card-scene" data-reveal-group="wave">
    <article class="card" id="card-wave" role="img" aria-label="The Great Wave at Kanagawa — towering blue wave with claw curls, distant Mt Fuji under sunset sky, small boats beneath">

      <svg class="ukiyo-scene" viewBox="0 0 440 587" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <!-- Sky gradient — warm sunset -->
          <linearGradient id="waveSky" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#c94030"/>
            <stop offset="50%" stop-color="#8a5040"/>
            <stop offset="100%" stop-color="#3a3040"/>
          </linearGradient>

          <!-- Wave blue gradient -->
          <linearGradient id="waveBlue" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#2a5a8c"/>
            <stop offset="60%" stop-color="#1a3a6c"/>
            <stop offset="100%" stop-color="#0a2a4c"/>
          </linearGradient>

          <!-- Foam white -->
          <radialGradient id="foamGrad" cx="50%" cy="30%" r="70%">
            <stop offset="0%" stop-color="#f8f0e8"/>
            <stop offset="100%" stop-color="#d8cec0"/>
          </radialGradient>
        </defs>

        <!-- Sky -->
        <rect width="440" height="587" fill="url(#waveSky)"/>

        <!-- Mt Fuji — small, serene in distance -->

          <polygon points="200,200 230,150 260,200" fill="#4a7a9c"/>

          <!-- Snow cap -->
          <polygon points="215,180 230,150 245,180" fill="#e8ddd0" opacity="0.9"/>
        </g>

        <!-- ===== MAIN WAVE — sweeping cresting curve ===== -->
        <path d="M-20 420 Q30 380, 80 340 Q120 290, 160 250 Q190 210, 220 200 Q260 195, 300 220 Q340 250, 370 300 Q395 340, 420 380 L460 420 L460 587 L-20 587 Z" fill="url(#waveBlue)" stroke="#1a2a4c" stroke-width="1"/>

        <!-- ===== WAVE CLAW CURLS ===== -->

<!-- DEBUG PANEL (visible via ?debug=true) -->
<div class="debug-panel" id="debugPanel">
  <div style="color:#d4a856;font-weight:bold;margin-bottom:6px;">⚡ The Steaming Soul — Debug Console</div>
  <div id="debugEntries"></div>
</div>

<!-- ============================================================
     JAVASCRIPT — Interaction engine (no dependencies)
     ============================================================ -->
<script>
(function() {
  'use strict';

  /* ===== CONFIGURATION ===== */
  var REVEAL_DURATION = 150; // ms — absolute ship bar: FFCT ≤ 150ms
  var OBSERVER_THRESHOLD = 0.25; // 25% intersection to trigger
  var ROOT_MARGIN = '200px';   // early trigger prevents FFCT latency

  /* Query params */
  var DEBUG_MODE = /(?:^|&)debug=true(?:&|$)/i.test(window.location.search);
  var SHOW_TIMER = /(?:^|&)timer=true(?:&|$)/i.test(window.location.search);

  if (DEBUG_MODE || SHOW_TIMER) {
    document.body.classList.add('debug-active');
  }

  /* ===== STATE ===== */
  var audioCtx = null;
  var steamGainNode = null;
  var humOscillators = [];
  var soulRevealed = false;
  var globalClarityReached = false;
  var debugLog = [];
  var ffctHistory = [];

  /* ===== DEBUG UTILITIES ===== */
  function debug(label, value) {
    if (!DEBUG_MODE) return;
    var passed = value !== undefined && typeof value === 'number' && value <= REVEAL_DURATION;
    var entry = document.createElement('div');
    entry.className = 'debug-entry ' + (passed ? 'debug-pass' : 'debug-fail');
    entry.innerHTML = '<span class="debug-label">' + label + ':</span> ' + (typeof value === 'number' ? value.toFixed(1) + 'ms' : value);
    var container = document.getElementById('debugEntries');
    if (container) {
      container.insertBefore(entry, container.firstChild);
    }
    debugLog.push({ time: Date.now(), label: label, value: value });
  }

  function flashFFCTFail() {
    var flash = document.getElementById('ffctFlash');
    if (flash) {
      flash.classList.add('active');
      setTimeout(function() { flash.classList.remove('active'); }, 600);
    }
  }

  function updateBadge(ffctMs) {
    var badge = document.getElementById('ffctBadge');
    if (!badge) return;
    badge.textContent = 'FFCT: ' + ffctMs.toFixed(1) + 'ms';
    badge.classList.add('show');
    if (ffctMs > REVEAL_DURATION) {
      badge.className = 'ffct-badge show fail';
      flashFFCTFail();
    } else {
      badge.className = 'ffct-badge show pass';
    }
  }

  /* ===== AUDIO ENGINE — Procedural steam hum ===== */
  /**
   * createSteamHum: Warm steam hum at ~80Hz ramping to ~220Hz
   * over exactly REVEAL_DURATION (150ms) using exponential gain.
   * Must fire within 50ms of visual class being applied.
   */
  function createSteamHum() {
    if (audioCtx) return;

    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();

      /* Master gain — exponential ramp over exactly 150ms */
      steamGainNode = audioCtx.createGain();
      steamGainNode.gain.setValueAtTime(0, audioCtx.currentTime);
      steamGainNode.gain.exponentialRampToValueAtTime(0.12, audioCtx.currentTime + REVEAL_DURATION / 1000);
      steamGainNode.connect(audioCtx.destination);

      /* Primary warm hum: 80Hz → 220Hz exponential pitch ramp over 150ms */
      var hum = audioCtx.createOscillator();
      hum.type = 'sine';
      hum.frequency.setValueAtTime(80, audioCtx.currentTime);
      hum.frequency.exponentialRampToValueAtTime(220, audioCtx.currentTime + REVEAL_DURATION / 1000);
      hum.connect(steamGainNode);
      hum.start();
      humOscillators.push(hum);

      /* Sub-harmonic warmth: gentle ~44Hz anchor */
      var sub = audioCtx.createOscillator();
      sub.type = 'sine';
      sub.frequency.setValueAtTime(44, audioCtx.currentTime);
      var subGain = audioCtx.createGain();
      subGain.gain.setValueAtTime(0.04, audioCtx.currentTime);
      sub.connect(subGain);
      subGain.connect(steamGainNode);
      sub.start();
      humOscillators.push(sub);

      soulRevealed = true;
      debug('audio', 'Steam hum started (80→220Hz)');

    } catch (e) {
      console.warn('[Steaming Soul] Audio unavailable:', e.message || e);
    }
  }

  /* Resume audio after user gesture (browser policy) */
  function resumeAudio() {
    if (audioCtx && audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
  }
  document.addEventListener('click', resumeAudio, { once: true });
  document.addEventListener('touchstart', resumeAudio, { once: true });

  /* ===== REVEAL ENGINE — The 150ms Soul Lock ===== */

  /**
   * toggleClarity: Core reveal mechanism.
   * Sets up performance marks before adding .clear class,
   * then measures actual FFCT from transitionend event.
   */
  function toggleClarity(card, scene) {
    if (card.classList.contains('clear')) return;

    /* Pre-calculate geometry before observer fires (no layout thrashing) */
    var cardRect = card.getBoundingClientRect();
    var triggerTime = performance.now();

    /* Mark the mist reveal trigger for Lighthouse Core Web Vitals */
    performance.mark('mist-reveal-trigger');

    /* Remove old class to reset transition state */
    card.classList.remove('clear');

    /* Force reflow so CSS transition fires cleanly on next frame */
    void card.offsetWidth;

    var preToggleTime = performance.now();

    /* === ADD .clear — triggers the 150ms mist-to-clarity transition === */
    card.classList.add('clear');

    var postToggleTime = performance.now();

    debug('toggle', triggerTime - (card._initTime || triggerTime) + ' | toggle: ' + (postToggleTime - preToggleTime).toFixed(1) + 'ms');

    /* Log the class application time */
    card._initTime = postToggleTime;

    /* === Attach one-time transitionend listener for FFCT measurement === */
    var ffctStart = performance.now();
    var measuredFFCT = 0;
    var onceDone = false;

    function onTransitionEnd(e) {
      if (onceDone || e.propertyName !== 'filter') return;
      onceDone = true;
      measuredFFCT = performance.now() - ffctStart;

      /* Performance measure for Lighthouse Core Web Vitals */
      performance.mark('mist-reveal-complete');
      try {
        performance.measure('first-frame-clarity', 'mist-reveal-trigger', 'mist-reveal-complete');
      } catch (e2) { /* may fail if marks too close, that's OK */ }

      debug('FFCT', measuredFFCT);
      ffctHistory.push(measuredFFCT);

      updateBadge(measuredFFCT);

      /* Fire custom events with the measured FFCT */
      if (scene) {
        scene.dispatchEvent(new CustomEvent('soul-reveal', {
          bubbles: true, cancelable: true,
          detail: {
            cardId: card.id, group: scene.dataset.revealGroup,
            timestamp: triggerTime, revealDurationMs: REVEAL_DURATION,
            actualFFCTms: measuredFFCT,
            message: 'Soul revealed — mist dissolving'
          }
        }));

        scene.dispatchEvent(new CustomEvent('clarity-lock', {
          bubbles: true, cancelable: true,
          detail: {
            cardId: card.id, group: scene.dataset.revealGroup,
            timestamp: performance.now(), revealDurationMs: REVEAL_DURATION,
            actualFFCTms: measuredFFCT,
            message: 'Clarity locked — soul visible'
          }
        }));
      }

      /* === Global state — first card achieves clarity === */
      if (!globalClarityReached) {
        globalClarityReached = true;
        document.body.classList.add('clarity-reached');
      }

      card.removeEventListener('transitionend', onTransitionEnd);
    }

    card.addEventListener('transitionend', onTransitionEnd);

    /* === Trigger audio within 50ms of visual lock === */
    /* Fire directly — no rAF delay. The browser will schedule immediately. */
    createSteamHum();
  }


  /* ===== INTERSECTION OBSERVER SETUP ===== */
  var cardScenes = document.querySelectorAll('.card-scene');

  var revealObserver = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (!entry.isIntersecting) return;

      var scene = entry.target;
      var card = scene.querySelector('.card');

      if (!card || card.classList.contains('clear')) return;

      /* Pre-calculate geometry before triggering */
      var rect = card.getBoundingClientRect();
      var vpCenterY = window.innerHeight / 2;
      var cardCenterY = rect.top + rect.height / 2;
      var _viewportGap = Math.abs(cardCenterY - vpCenterY);

      toggleClarity(card, scene);
    });
  }, {
    root: null,
    threshold: OBSERVER_THRESHOLD,
    rootMargin: ROOT_MARGIN   /* early trigger: 200px before entering viewport */
  });

  cardScenes.forEach(function(scene) { revealObserver.observe(scene); });


  /* ===== SCROLL HINT HIDE ===== */
  var scrollHint = document.getElementById('scrollHint');
  if (scrollHint) {
    var hintHidden = false;
    window.addEventListener('scroll', function() {
      if (!hintHidden && window.scrollY > 50) {
        scrollHint.classList.add('hidden');
        hintHidden = true;
      }
    }, { passive: true });
  }


  /* ===== PARALLAX — subtle translateY only (GPU-composited, no layout thrashing) ===== */
  var cardElements = document.querySelectorAll('.card');
  var ticking = false;

  window.addEventListener('scroll', function() {
    if (!ticking) {
      requestAnimationFrame(function() {
        cardElements.forEach(function(card) {
          var rect = card.getBoundingClientRect();
          var center = rect.top + rect.height / 2;
          var viewCenter = window.innerHeight / 2;
          var offset = (center - viewCenter) * 0.015;

          if (card.classList.contains('clear')) {
            card.style.transform = 'translateY(' + offset.toFixed(1) + 'px)';
          } else {
            card.style.transform = '';
          }
        });
        ticking = false;
      });
      ticking = true;
    }
  }, { passive: true });


  /* ===== PUBLIC API — Event Listener Examples ===== */
  /*
   * document.addEventListener('soul-reveal', function(e) {
   *   console.log('[soul-reveal]', e.detail);
   * });
   *
   * document.addEventListener('clarity-lock', function(e) {
   *   var elapsed = performance.now() - e.detail.timestamp;
   *   console.log('[clarity-lock] FFCT:', e.detail.actualFFCTms, 'measured');
   * });
   */

})();
</script>

</body>
